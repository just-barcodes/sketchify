version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    assignees:
      - just-barcodes
    groups:
      # Batch low-risk updates into a single PR; majors stay separate for review.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    assignees:
      - just-barcodes
    groups:
      actions:
        patterns:
          - '*'
